<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/webp" href="/Northvale%20Logo.webp" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Northvale TCG - Váš průvodce světem karetních her Pokémon, Disney Lorcana a One Piece. Originální produkty, příslušenství a sběratelský blog." />
    <title>Northvaletcg.eu</title>
    <!-- Preload Hero Banner for LCP Optimization -->
    <link rel="preload" href="/Akce - NORTHVALE.webp" as="image" fetchpriority="high" />
    
    <!-- Google Consent Mode V2 Initial State Setup -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}

      // Load saved preferences or default to denied for analytical/marketing cookies
      (function() {
        var savedPrefs = localStorage.getItem('northvale-cookie-preferences');
        var consent = {
          analytics: 'denied',
          marketing: 'denied'
        };
        if (savedPrefs) {
          try {
            var parsed = JSON.parse(savedPrefs);
            consent.analytics = parsed.analytics ? 'granted' : 'denied';
            consent.marketing = parsed.marketing ? 'granted' : 'denied';
          } catch (e) {
            console.error('Error parsing cookie preferences', e);
          }
        }
        
        gtag('consent', 'default', {
          'ad_storage': consent.marketing,
          'ad_user_data': consent.marketing,
          'ad_personalization': consent.marketing,
          'analytics_storage': consent.analytics,
          'wait_for_update': 500
        });
        
        gtag('set', 'ads_data_redaction', true);
      })();
    </script>
    
    <!-- Google Analytics (GA4) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-6TDQCGWYTQ"></script>
    <script>
      gtag('js', new Date());
      gtag('config', 'G-6TDQCGWYTQ');
    </script>
    <!-- Google Identity Services SDK -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <!-- Apple Sign-in SDK -->
    <script type="text/javascript" src="https://appleid.cdn-apple.com/appleauth/static/jsapi/appleid/1/en_US/appleid.auth.js" async defer></script>
  </head>

  </body>
</html>
